<div
  class="container py-4 t-resources"
  *transloco="let t; prefix: 'tutorial.resources'"
  data-cy="tutorial-resources"
>
  <div class="text-center mb-4">
    <h1 class="fw-bold">{{ t('title') }}</h1>
    <p class="lead">{{ t('subtitle') }}</p>
  </div>

  <div class="row justify-content-center g-3">
    <div class="col-12 col-lg-8">
      <!-- On-site next steps -->
      <div class="card mb-3 t-resource-cta">
        <div class="card-body d-flex flex-column flex-md-row align-items-md-center gap-3">
          <i class="bi bi-bag-check fs-1 text-primary"></i>
          <div class="flex-grow-1">
            <h5 class="card-title mb-1">{{ t('decks_cta_title') }}</h5>
            <p class="card-text mb-0">{{ t('decks_cta_text') }}</p>
          </div>
          <a
            routerLink="/decks"
            [queryParams]="{ type: 'PRECONSTRUCTED' }"
            class="btn btn-primary text-nowrap"
            data-cy="tutorial-resource-link"
            gaEvent="referral"
            gaCategory="tutorial_resources"
            gaLabel="preconstructed_decks"
          >
            {{ t('decks_cta') }}
          </a>
        </div>
      </div>

      <!-- External resources -->
      <div class="list-group">
        @for (resource of resources; track resource.key) {
          <a
            [href]="resource.url"
            target="_blank"
            rel="noopener noreferrer"
            class="list-group-item list-group-item-action d-flex align-items-center gap-3"
            data-cy="tutorial-resource-link"
            gaEvent="referral"
            gaCategory="tutorial_resources"
            [gaLabel]="resource.key"
          >
            <i class="bi {{ resource.icon }} fs-4 t-resource-icon"></i>
            <span class="flex-grow-1">
              <span class="d-block fw-semibold">{{ t(resource.key) }}</span>
              <small class="text-body-secondary">
                {{ t(resource.key + '_text') }}
              </small>
            </span>
            <i class="bi bi-box-arrow-up-right opacity-50"></i>
          </a>
        }
      </div>

      <div class="text-center mt-4">
        <a routerLink="/tutorial" class="btn btn-outline-secondary">
          <i class="bi bi-arrow-left"></i> {{ t('back') }}
        </a>
      </div>
    </div>
  </div>
</div>
