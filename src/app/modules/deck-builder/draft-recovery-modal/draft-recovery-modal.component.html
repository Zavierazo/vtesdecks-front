<div *transloco="let t; read: 'deck_builder'">
    <div class="modal-header">
        <h5 class="modal-title">{{ t('draft_recovery_title') }}</h5>
    </div>
    <div class="modal-body">
        <p>{{ t('draft_recovery_message') }}</p>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="modal.close(false)">
            {{ t('draft_recovery_discard') }}
        </button>
        <button type="button" class="btn btn-primary" (click)="modal.close(true)">
            {{ t('draft_recovery_restore') }}
        </button>
    </div>
</div>
