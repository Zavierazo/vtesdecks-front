<ng-container *transloco="let t; read: 'deck_builder'">
    <div class="modal-header">
        <h4 class="modal-title">{{ t('import_recent_title') }}</h4>
        <button type="button" class="btn-close" [attr.aria-label]="'shared.close' | transloco"
            (click)="modal.dismiss()"></button>
    </div>
    <div class="modal-body">
        @if (recentDecks().length === 0) {
        <p class="text-muted">{{ t('import_recent_empty') }}</p>
        } @else {
        <ul class="list-group">
            @for (deck of recentDecks(); track deck.id) {
            <li class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
                role="button" (click)="selectDeck(deck.id)">
                <div>
                    <span class="fw-semibold">{{ deck.name }}</span>
                    <span class="text-muted ms-2 small">{{ deck.author }}</span>
                </div>
                <i class="bi bi-box-arrow-in-down"></i>
            </li>
            }
        </ul>
        }
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" (click)="modal.dismiss()">
            {{ 'shared.cancel' | transloco }}
        </button>
    </div>
</ng-container>
