<ng-container *transloco="let t; read:'markdown-textarea'">
  <div class="d-flex flex-wrap align-items-center column-gap-2 row-gap-1 mb-1">
    <div class="btn-group">
      <div ngbDropdown class="btn-group">
        <button type="button" class="btn btn-sm" id="disciplineDropdown" [disabled]="isPreviewOnly()"
          [ngbTooltip]="t('discipline')" container="body" ngbDropdownToggle>
          <i class="vtes vtes-small dominate"></i>
        </button>
        <div ngbDropdownMenu aria-labelledby="disciplineDropdown">
          <div class="d-flex flex-row flex-wrap">
            @for(discipline of disciplines; track discipline){
            <button class="w-25 d-flex justify-content-center" ngbDropdownItem (click)="onDiscipline(discipline)">
              <i class="vtes vtes-small" [ngClass]="discipline.icon"></i>
            </button>
            }
          </div>
        </div>
      </div>
      <div ngbDropdown class="btn-group">
        <button type="button" class="btn btn-sm" id="clanDropdown" [disabled]="isPreviewOnly()" [ngbTooltip]="t('clan')"
          container="body" ngbDropdownToggle>
          <i class="vtes vtes-small gangrel"></i>
        </button>
        <div ngbDropdownMenu aria-labelledby="clanDropdown">
          <div class="d-flex flex-row flex-wrap">
            @for(clan of clans; track clan){
            <button class="w-25 d-flex justify-content-center" ngbDropdownItem (click)="onClan(clan)">
              <i class="vtes vtes-small" [ngClass]="clan.icon"></i>
            </button>
            }
          </div>
        </div>
      </div>
      <div ngbDropdown #cardDropdown="ngbDropdown" class="btn-group" autoClose="outside"
        (openChange)="onCardDropdownOpenChange($event)">
        <button type="button" class="btn btn-sm" id="cardDropdownToggle" [disabled]="isPreviewOnly()"
          [ngbTooltip]="t('card')" container="body" ngbDropdownToggle>
          <i class="btn-icon bi bi-person-vcard bi-fs-1_2x"></i>
        </button>
        <div ngbDropdownMenu aria-labelledby="cardDropdownToggle" class="markdown-card-search p-2">
          <input #cardSearchInput type="text" class="form-control form-control-sm mb-2" autocomplete="off"
            [placeholder]="t('card_search_placeholder')" [formControl]="cardSearchControl"
            (keydown)="onCardSearchKeydown($event)" />
          <div class="markdown-card-search-results">
            <app-suggestion-list [items]="cardResults()" [activeIndex]="cardActiveIndex()" [term]="cardTerm()"
              [emptyKey]="cardEmptyKey()" (picked)="onCardPick($event)" />
          </div>
        </div>
      </div>
    </div>
    <div class="btn-group">
      <button type="button" class="btn btn-sm" [disabled]="isPreviewOnly()" [ngbTooltip]="t('bold')" container="body"
        (click)="onBold()">
        <i class="btn-icon bi bi-type-bold bi-fs-1_2x"></i>
      </button>
      <button type="button" class="btn btn-sm" [disabled]="isPreviewOnly()" [ngbTooltip]="t('italic')" container="body"
        (click)="onItalic()">
        <i class="btn-icon bi bi-type-italic bi-fs-1_2x"></i>
      </button>
      <button type="button" class="btn btn-sm" [disabled]="isPreviewOnly()" [ngbTooltip]="t('strikethrough')"
        container="body" (click)="onStrikethrough()">
        <i class="btn-icon bi bi-type-strikethrough bi-fs-1_2x"></i>
      </button>
      <button type="button" class="btn btn-sm" [disabled]="isPreviewOnly()" [ngbTooltip]="t('title')" container="body"
        (click)="onTitle()">
        <i class="btn-icon bi bi-type-h1 bi-fs-1_2x"></i>
      </button>
    </div>
    <div class="btn-group">
      <button type="button" class="btn btn-sm" [disabled]="isPreviewOnly()" [ngbTooltip]="t('link')" container="body"
        (click)="onLink()">
        <i class="btn-icon bi bi-link-45deg bi-fs-1_2x"></i>
      </button>
      <button type="button" class="btn btn-sm" [disabled]="isPreviewOnly()" [ngbTooltip]="t('image')" container="body"
        (click)="onImage()">
        <i class="btn-icon bi bi-image bi-fs-1_2x"></i>
      </button>
      <button type="button" class="btn btn-sm" [disabled]="isPreviewOnly()" [ngbTooltip]="t('youtube')" container="body"
        (click)="onYoutube()">
        <i class="btn-icon bi bi-youtube bi-fs-1_2x"></i>
      </button>
    </div>
    <div class="btn-group">
      <button type="button" class="btn btn-sm" [disabled]="isPreviewOnly()" [ngbTooltip]="t('number_list')"
        container="body" (click)="onList(true)">
        <i class="btn-icon bi bi-list-ol bi-fs-1_2x"></i>
      </button>
      <button type="button" class="btn btn-sm" [disabled]="isPreviewOnly()" [ngbTooltip]="t('dot_list')"
        container="body" (click)="onList(false)">
        <i class="btn-icon bi bi-list-task bi-fs-1_2x"></i>
      </button>
      <button type="button" class="btn btn-sm" [disabled]="isPreviewOnly()" [ngbTooltip]="t('code')" container="body"
        (click)="onCode()">
        <i class="btn-icon bi bi-code bi-fs-1_2x"></i>
      </button>
      <button type="button" class="btn btn-sm" [disabled]="isPreviewOnly()" [ngbTooltip]="t('quote')" container="body"
        (click)="onQuote()">
        <i class="btn-icon bi bi-quote bi-fs-1_2x"></i>
      </button>
      <button type="button" class="btn btn-sm" [disabled]="isPreviewOnly()" [ngbTooltip]="t('table')" container="body"
        (click)="onTable()">
        <i class="btn-icon bi bi-table bi-fs-1_2x"></i>
      </button>
      <button type="button" class="btn btn-sm" [ngbTooltip]="t('help')" container="body" (click)="onHelp()">
        <i class="btn-icon bi bi-question-lg bi-fs-1_2x"></i>
      </button>
    </div>
    <div class="ms-auto">
      @if(splitAvailable()){
      <button type="button" class="btn btn-sm" [ngClass]="splitEnabled() ? 'btn-primary' : 'btn-outline-primary'"
        [ngbTooltip]="t('split_view')" container="body" (click)="onToggleSplit()">
        <i class="bi bi-layout-split"></i>
      </button>
      } @else {
      <button type="button" class="btn btn-primary btn-sm" (click)="onPreviewDescription()">
        <i class="bi bi-search me-2"></i>
        {{ t('preview') }}
      </button>
      }
    </div>
  </div>
  <div [class.editor-split]="isSplit()">
    @if(!isPreviewOnly()){
    <div class="form-floating editor-pane">
      <textarea #ref class="form-control w-vw-100 markdown-textarea" id="description" type="text"
        [placeholder]="placeholderWithExample" [formControl]="control()" (input)="onTextareaInput()"
        (paste)="onTextareaPaste($event)" (click)="onTextareaClick()" (keydown)="onTextareaKeydown($event)"
        (keyup)="onTextareaKeyup($event)" (blur)="onTextareaBlur()"></textarea>
      <label for="description">{{ label() }}</label>
      @if(inlineOpen()){
      <div class="dropdown-menu show markdown-suggestions" [style.top.px]="inlinePos().top"
        [style.left.px]="inlinePos().left">
        <app-suggestion-list [items]="inlineItems()" [activeIndex]="inlineActiveIndex()" [term]="inlineTerm()"
          [emptyKey]="inlineEmptyKey()" (picked)="onInlinePick($event)" />
      </div>
      }
    </div>
    }
    @if(isSplit() || isPreviewOnly()){
    <div class="markdown-preview" [class.markdown-preview-split]="isSplit()">
      <app-markdown-text [ngClass]="{'mt-3': isPreviewOnly()}" [data]="previewValue()" />
    </div>
    }
  </div>
</ng-container>
