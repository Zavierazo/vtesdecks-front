<footer class="site-footer text-white" *transloco="let t; prefix: 'footer'">
  <div class="container py-5">
    <div class="row gy-4">
      <!-- Brand / Dark Pack -->
      <div class="col-12 col-lg-6">
        <div class="d-flex align-items-start gap-3">
          <img width="56" height="56" src="/assets/img/darkpack.png" alt="Dark Pack logo" class="footer-darkpack" />
          <p class="footer-trademark mb-0">
            {{ t('trademark') }}
            <a href="https://worldofdarkness.com" target="_blank" rel="noopener" class="footer-link">worldofdarkness.com</a>
          </p>
        </div>
      </div>

      <!-- Links -->
      <div class="col-6 col-lg-3">
        <h6 class="footer-heading">{{ t('about') }}</h6>
        <ul class="footer-links list-unstyled mb-0">
          <li><a [routerLink]="'/changelog'" class="footer-link">{{ t('changelog') }}</a></li>
          <li><a [routerLink]="'/terms'" class="footer-link">{{ t('terms') }}</a></li>
          <li><a [routerLink]="'/privacy-policy'" class="footer-link">{{ t('privacy_policy') }}</a></li>
        </ul>
      </div>

      <!-- Social -->
      <div class="col-6 col-lg-3">
        <h6 class="footer-heading">{{ t('follow_us') }}</h6>
        <div class="footer-social d-flex flex-wrap gap-2">
          <a class="social-btn" href="mailto:support@vtesdecks.com" target="_blank" rel="noopener" role="button"
            [title]="t('mail')" [attr.aria-label]="t('mail')"><i class="bi bi-envelope-fill"></i></a>
          <a class="social-btn" href="https://www.instagram.com/vtesdecks" target="_blank" rel="noopener" role="button"
            title="Instagram" aria-label="Instagram"><i class="bi bi-instagram"></i></a>
          <a class="social-btn" href="https://github.com/zavierazo/vtesdecks-front" target="_blank" rel="noopener"
            role="button" title="GitHub" aria-label="GitHub"><i class="bi bi-github"></i></a>
        </div>
      </div>
    </div>
  </div>

  <div class="footer-bottom">
    <div class="container py-3 text-center small">
      v{{ appVersion }} · © 2020-{{ now | date:'yy' }} {{ t('copyright') }}
    </div>
  </div>
</footer>
